var bsz = 0.5;
var st = "n"; // n=neutral, c=concentration, r=relaxation  
var idx = 0;
var run = false;
var tmr = null;

var cv = document.getElementById("cv");
var cx = cv.getContext("2d");
var stars = [];

function rsz() {
  cv.width = innerWidth; cv.height = innerHeight;
  stars = [];
  for (var i=0;i<60;i++) stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.5+.5,p:Math.random()*7});
}
addEventListener("resize",rsz); rsz();

function frame() {
  cx.clearRect(0,0,cv.width,cv.height);
  var t = Date.now()*.001;
  // stars
  for (var i=0;i<stars.length;i++) {
    var s=stars[i]; var a=.3+.3*Math.sin(s.p+t*.5);
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);cx.fillStyle="rgba(200,200,255,"+a+")";cx.fill();
  }
  // balloon
  var px=cv.width/2, py=cv.height*.44;
  var mn=35, mx=Math.min(cv.width,cv.height)*.26;
  var rd=mn+(mx-mn)*bsz;
  var fy=py+Math.sin(t*1.2)*8;
  // glow
  var g1=cx.createRadialGradient(px,fy,rd*.3,px,fy,rd*2.5);
  g1.addColorStop(0,st=="c"?"rgba(248,113,113,.2)":st=="r"?"rgba(52,211,153,.15)":"rgba(167,139,250,.1)");
  g1.addColorStop(1,"transparent");cx.fillStyle=g1;cx.fillRect(px-rd*3,fy-rd*3,rd*6,rd*6);
  // body
  var g2=cx.createRadialGradient(px-rd*.3,fy-rd*.3,rd*.1,px,fy,rd);
  if(st=="c"){g2.addColorStop(0,"#fca5a5");g2.addColorStop(.5,"#ef4444");g2.addColorStop(1,"#991b1b")}
  else if(st=="r"){g2.addColorStop(0,"#6ee7b7");g2.addColorStop(.5,"#10b981");g2.addColorStop(1,"#065f46")}
  else{g2.addColorStop(0,"#c4b5fd");g2.addColorStop(.5,"#8b5cf6");g2.addColorStop(1,"#4c1d95")}
  cx.beginPath();cx.ellipse(px,fy,rd*.85,rd,0,0,6.28);cx.fillStyle=g2;cx.fill();
  // highlight
  cx.beginPath();cx.ellipse(px-rd*.25,fy-rd*.35,rd*.12,rd*.22,-.4,0,6.28);cx.fillStyle="rgba(255,255,255,.22)";cx.fill();
  // string
  cx.beginPath();cx.moveTo(px,fy+rd);cx.quadraticCurveTo(px+8,fy+rd+35,px-3,fy+rd+70);cx.strokeStyle="rgba(255,255,255,.15)";cx.lineWidth=1.5;cx.stroke();
  // pct label
  cx.fillStyle="rgba(255,255,255,.5)";cx.font=Math.max(14,rd*.2)+"px system-ui";cx.textAlign="center";
  cx.fillText(Math.round(bsz*100)+"%",px,fy+6);
  requestAnimationFrame(frame);
}
frame();

function step() {
  if (idx >= DATA.length) {
    run = false;
    document.getElementById("pb").textContent = "Done";
    document.getElementById("inM").textContent = "Simulation complete!";
    return;
  }
  var p = DATA[idx];
  idx++;
  // set state
  if (p.pred === "concentration") {
    st = "c";
    bsz = Math.min(0.95, bsz + 0.05);
  } else {
    st = "r";
    bsz = Math.max(0.08, bsz - 0.05);
  }
  // update DOM
  var sv = document.getElementById("stV");
  sv.textContent = st=="c" ? "Concentrating" : "Relaxing";
  sv.className = "sv " + (st=="c" ? "red" : "grn");
  document.getElementById("szV").textContent = Math.round(bsz*100)+"%";
  document.getElementById("ctV").textContent = idx+"/"+DATA.length;
  document.getElementById("acV").textContent = p.acc+"%";
  var ok = p.pred===p.truth;
  document.getElementById("inM").textContent = (st=="c"?"Concentration":"Relaxation")+" detected";
  document.getElementById("inD").textContent = "Truth: "+p.truth+" "+(ok?"OK":"MISS")+" | t="+p.t+"s | Acc: "+p.acc+"%";
  tmr = setTimeout(step, 800);
}

function toggle() {
  if (run) {
    run = false; clearTimeout(tmr);
    document.getElementById("pb").textContent = "Resume";
  } else {
    if (idx >= DATA.length) { idx=0; bsz=0.5; st="n"; }
    run = true;
    document.getElementById("pb").textContent = "Pause";
    step();
  }
}
